name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: ${{ matrix.target }}
      - run: cargo test --workspace --all-features
      - run: cargo build --release -p agentgate --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/agentgate dist/agentgate-${{ matrix.target }}
          shasum -a 256 dist/agentgate-${{ matrix.target }} > dist/agentgate-${{ matrix.target }}.sha256
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/agentgate-${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: agentgate-${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
