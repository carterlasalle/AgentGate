name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features
      - name: Rustdoc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps
      - name: Documentation integrity
        run: python3 scripts/check_docs.py

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check advisories bans licenses sources

  release-smoke:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    name: Release smoke (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --locked --release -p agentgate --target ${{ matrix.target }}
      - name: Verify release payload and checksum
        shell: bash
        run: |
          binary=target/${{ matrix.target }}/release/agentgate
          test -s "$binary"
          shasum -a 256 "$binary" > "$binary.sha256"
          test -s "$binary.sha256"
