name: Security campaigns

on:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [jsonrpc_frame, policy_yaml, tool_descriptor]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: taiki-e/install-action@cargo-fuzz
      - name: Fuzz ${{ matrix.target }}
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=300

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  redteam:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97.0
      - run: cargo test -p agentgate --test redteam_corpus -- --nocapture
      - run: cargo bench -p agentgate-core --bench canonical_action
